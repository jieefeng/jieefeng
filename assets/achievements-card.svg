<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="50%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1C2128"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D97706" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="493" height="193" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="1" y="1" width="493" height="193" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
  <text x="248" y="36" text-anchor="middle" fill="#D97706" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="600">📊 数据统计</text>

  <!-- Card 1: Contributions -->
  <rect x="20" y="55" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
  <text x="90" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">📈</text>
  <text x="90" y="115" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700">315</text>
  <text x="90" y="135" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">总贡献次数</text>

  <!-- Card 2: Stars -->
  <rect x="178" y="55" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
  <text x="248" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">⭐</text>
  <text x="248" y="115" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700">35</text>
  <text x="248" y="135" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">获得的 Star</text>

  <!-- Card 3: Pull Requests -->
  <rect x="336" y="55" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
  <text x="406" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">🔀</text>
  <text x="406" y="115" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700">60</text>
  <text x="406" y="135" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">Pull Requests</text>

  <!-- Footer -->
  <text x="248" y="180" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="10">数据来自 GitHub API | 每日自动更新</text>
</svg>
