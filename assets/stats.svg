<svg xmlns="http://www.w3.org/2000/svg" width="520" height="200" viewBox="0 0 520 200">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#1F6FEB;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="520" height="200" rx="8" fill="#0D1117"/>
  <rect x="0.5" y="0.5" width="519" height="199" rx="8" fill="none" stroke="#30363D"/>

  <!-- 标题 -->
  <circle cx="20" cy="16" r="5" fill="#238636"/>
  <text x="32" y="20" fill="#E6EDF3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="600">GitHub Stats</text>

  <!-- 左列 -->
  <g transform="translate(20, 42)">
    <!-- Stars -->
    <text fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Stars</text>
    <text x="110" fill="#3FB950" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">STARS_PLACEHOLDER</text>
  </g>

  <g transform="translate(20, 78)">
    <!-- Commits -->
    <text fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Commits</text>
    <text x="110" fill="#58A6FF" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">COMMITS_PLACEHOLDER</text>
  </g>

  <g transform="translate(20, 114)">
    <!-- Pull Requests -->
    <text fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Pull Requests</text>
    <text x="110" fill="#A371F7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">PRS_PLACEHOLDER</text>
  </g>

  <g transform="translate(20, 150)">
    <!-- Issues -->
    <text fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Issues</text>
    <text x="110" fill="#F0883E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">ISSUES_PLACEHOLDER</text>
  </g>

  <!-- 右列 -->
  <g transform="translate(280, 42)">
    <!-- Repositories -->
    <text fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Repositories</text>
    <text x="110" fill="#E6EDF3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">REPOS_PLACEHOLDER</text>
  </g>

  <!-- 底部分隔线 -->
  <line x1="20" y1="185" x2="500" y2="185" stroke="#21262D" stroke-width="1"/>
  <text x="260" y="197" text-anchor="middle" fill="#484F58" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10">Updated daily via GitHub Actions</text>
</svg>
