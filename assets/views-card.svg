<svg xmlns="http://www.w3.org/2000/svg" width="320" height="90" viewBox="0 0 320 90">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#7C3AED" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="316" height="86" rx="14" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="2" y="2" width="316" height="86" rx="14" fill="none" stroke="url(#borderGrad)" stroke-width="2"/>
  <rect x="2" y="22" width="4" height="46" rx="2" fill="url(#borderGrad)"/>
  <g transform="translate(24, 45)">
    <circle cx="0" cy="0" r="14" fill="#1E1E2E" stroke="#7C3AED" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="9" ry="5" fill="none" stroke="#C084FC" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#F472B6"/>
  </g>
  <text x="52" y="38" fill="#6B7280" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" letter-spacing="2">VISITORS</text>
  <text x="52" y="66" fill="url(#textGrad)" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" letter-spacing="-1" filter="url(#glow)">31</text>
  <circle cx="290" cy="20" r="2" fill="#7C3AED" opacity="0.6"/>
  <circle cx="298" cy="28" r="1.5" fill="#A855F7" opacity="0.5"/>
  <circle cx="284" cy="30" r="1" fill="#EC4899" opacity="0.4"/>
  <circle cx="300" cy="18" r="1" fill="#C084FC" opacity="0.3"/>
</svg>