<svg xmlns="http://www.w3.org/2000/svg" width="360" height="100" viewBox="0 0 360 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#2D2D3F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="countGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000040"/>
    </filter>
  </defs>
  <rect width="360" height="100" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect width="360" height="4" rx="2" fill="url(#accent)"/>
  <g transform="translate(32, 50)">
    <circle cx="20" cy="0" r="24" fill="#FCE7F3" opacity="0.15"/>
    <circle cx="20" cy="0" r="18" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.4"/>
    <ellipse cx="20" cy="0" rx="12" ry="8" fill="none" stroke="#EC4899" stroke-width="2.5"/>
    <circle cx="20" cy="0" r="4" fill="#EC4899"/>
    <circle cx="20" cy="0" r="4" fill="#EC4899" filter="url(#glow)"/>
  </g>
  <text x="95" y="38" fill="#9CA3AF" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" letter-spacing="1">PROFILE VIEWS</text>
  <text x="95" y="70" fill="url(#countGrad)" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="-2" filter="url(#glow)">31</text>
  <circle cx="340" cy="20" r="3" fill="#7C3AED" opacity="0.6"/>
  <circle cx="350" cy="30" r="2" fill="#EC4899" opacity="0.4"/>
  <circle cx="335" cy="35" r="1.5" fill="#F472B6" opacity="0.5"/>
</svg>
