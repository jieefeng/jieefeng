<svg xmlns="http://www.w3.org/2000/svg" width="340" height="90" viewBox="0 0 340 90">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#7C3AED" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="338" height="88" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="1" y="1" width="338" height="88" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
  <rect x="1" y="20" width="3" height="50" rx="1.5" fill="url(#borderGrad)"/>
  <g transform="translate(26, 45)">
    <path d="M-12,-1 C-12,-1 -5,-7 0,-7 C5,-7 12,-1 12,-1 C12,-1 5,5 0,5 C-5,5 -12,-1 -12,-1 Z" fill="none" stroke="url(#eyeGrad)" stroke-width="1.3"/>
    <circle cx="0" cy="-1" r="2.5" fill="#C084FC"/>
  </g>
  <text x="52" y="36" fill="#8B949E" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10.5" font-weight="500" letter-spacing="2.5">VISITORS</text>
  <text x="52" y="66" fill="url(#textGrad)" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5" filter="url(#glow)">31</text>
  <circle cx="300" cy="18" r="1.5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="310" cy="26" r="1" fill="#A855F7" opacity="0.4"/>
  <circle cx="305" cy="14" r="0.8" fill="#EC4899" opacity="0.3"/>
  <circle cx="314" cy="20" r="1.2" fill="#C084FC" opacity="0.35"/>
</svg>
