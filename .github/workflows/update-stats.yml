name: Update GitHub Stats

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 AM Beijing Time (UTC+8)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-stats.yml'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets

          # Fetch user stats via GraphQL (use viewer for authenticated context)
          echo "=== Fetching stats via GraphQL ==="
          QUERY=$(curl -s -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ viewer { repositories(ownerAffiliations: OWNER, isFork: false) { totalCount stargazerCount } contributionsCollection(includePrivate: true) { totalContributions } } }"}' \
            https://api.github.com/graphql)

          echo "GraphQL response: $QUERY"

          TOTAL_STARS=$(echo "$QUERY" | jq -r '.data.viewer.repositories.stargazerCount // 0')
          TOTAL_REPOS=$(echo "$QUERY" | jq -r '.data.viewer.repositories.totalCount // 0')
          TOTAL_COMMITS=$(echo "$QUERY" | jq -r '.data.viewer.contributionsCollection.totalContributions // 0')

          # Fetch PRs via REST API
          echo "=== Fetching PRs ==="
          TOTAL_PRS=$(curl -s -H "Authorization: bearer $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=author:jieefeng+type:pr" | jq -r '.total_count // 0')
          echo "PRs: $TOTAL_PRS"

          # Fetch Issues via REST API
          echo "=== Fetching Issues ==="
          TOTAL_ISSUES=$(curl -s -H "Authorization: bearer $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=author:jieefeng+type:issue" | jq -r '.total_count // 0')
          echo "Issues: $TOTAL_ISSUES"

          # Fetch profile views from komarev.com
          echo "=== Fetching Profile Views ==="
          TOTAL_VIEWS=$(curl -s "https://komarev.com/ghpvc/?username=jieefeng&style=flat" | grep -oP '\d+' | head -1 || echo "0")
          echo "Views: $TOTAL_VIEWS"

          echo "=== Final Stats ==="
          echo "Stars=$TOTAL_STARS Commits=$TOTAL_COMMITS PRs=$TOTAL_PRS Issues=$TOTAL_ISSUES Repos=$TOTAL_REPOS Views=$TOTAL_VIEWS"

          # Generate stats card SVG
          cat > assets/stats.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="520" height="280" viewBox="0 0 520 280">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#FAFBFC"/>
                <stop offset="100%" stop-color="#F0F3F6"/>
              </linearGradient>
              <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#0969DA"/>
                <stop offset="100%" stop-color="#8250DF"/>
              </linearGradient>
              <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
                <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1B1F240D"/>
              </filter>
              <clipPath id="card-clip">
                <rect width="520" height="280" rx="12"/>
              </clipPath>
            </defs>
            <rect width="520" height="280" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="0.5" y="0.5" width="519" height="279" rx="12" fill="none" stroke="#D8DEE4" stroke-opacity="0.6"/>
            <rect width="520" height="3" fill="url(#accent)" clip-path="url(#card-clip)"/>
            <g transform="translate(24, 28)">
              <rect width="32" height="32" rx="8" fill="#F6F8FA" stroke="#D0D7DE"/>
              <path transform="translate(6,5)" d="M10 0C4.48 0 0 4.48 0 10c0 4.42 2.87 8.17 6.84 9.49.5.09.66-.22.66-.48v-1.7C4.58 17.91 4.02 16.14 4.02 16.14c-.46-1.15-1.11-1.46-1.11-1.46-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0110 5.8c.85.004 1.71.12 2.51.34 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.7-4.57 4.95.36.31.68.92.68 1.85v2.74c0 .27.16.58.67.48A10.01 10.01 0 0020 10c0-5.52-4.48-10-10-10z" fill="#656D76"/>
              <text x="42" y="16" fill="#1F2328" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="600" letter-spacing="-0.3">GitHub Stats</text>
              <text x="42" y="30" fill="#656D76" font-family="'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" letter-spacing="0.2">Contribution Overview</text>
            </g>
            <line x1="24" y1="72" x2="496" y2="72" stroke="#D8DEE4" stroke-opacity="0.5"/>
            <g transform="translate(24, 92)">
              <circle cx="8" cy="14" r="8" fill="#DDF4FF"/>
              <text x="24" y="12" fill="#656D76" font-family="'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" letter-spacing="0.3">STARS</text>
              <text x="24" y="32" fill="#1F2328" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">STARS_PLACEHOLDER</text>
            </g>
            <g transform="translate(24, 142)">
              <circle cx="8" cy="14" r="8" fill="#DAFBE1"/>
              <text x="24" y="12" fill="#656D76" font-family="'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" letter-spacing="0.3">COMMITS</text>
              <text x="24" y="32" fill="#1F2328" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">COMMITS_PLACEHOLDER</text>
            </g>
            <g transform="translate(24, 192)">
              <circle cx="8" cy="14" r="8" fill="#FBEFFF"/>
              <text x="24" y="12" fill="#656D76" font-family="'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" letter-spacing="0.3">PULL REQUESTS</text>
              <text x="24" y="32" fill="#1F2328" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">PRS_PLACEHOLDER</text>
            </g>
            <g transform="translate(280, 92)">
              <circle cx="8" cy="14" r="8" fill="#FFF8C5"/>
              <text x="24" y="12" fill="#656D76" font-family="'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" letter-spacing="0.3">ISSUES</text>
              <text x="24" y="32" fill="#1F2328" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">ISSUES_PLACEHOLDER</text>
            </g>
            <g transform="translate(280, 142)">
              <circle cx="8" cy="14" r="8" fill="#F6F8FA"/>
              <text x="24" y="12" fill="#656D76" font-family="'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" letter-spacing="0.3">REPOSITORIES</text>
              <text x="24" y="32" fill="#1F2328" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">REPOS_PLACEHOLDER</text>
            </g>
            <g transform="translate(280, 192)">
              <circle cx="8" cy="14" r="8" fill="#FFF1E5"/>
              <text x="24" y="12" fill="#656D76" font-family="'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" letter-spacing="0.3">PROFILE VIEWS</text>
              <text x="24" y="32" fill="#1F2328" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">VIEWS_PLACEHOLDER</text>
            </g>
            <line x1="24" y1="252" x2="496" y2="252" stroke="#D8DEE4" stroke-opacity="0.5"/>
            <g transform="translate(260, 268)">
              <circle cx="-52" cy="-3" r="3" fill="#2DA44E"/>
              <text x="-44" y="0" fill="#8B949E" font-family="'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" letter-spacing="0.2">Updated daily via GitHub Actions</text>
            </g>
          </svg>
          SVGEOF

          # Replace placeholders with actual values
          sed -i "s/STARS_PLACEHOLDER/$TOTAL_STARS/g" assets/stats.svg
          sed -i "s/COMMITS_PLACEHOLDER/$TOTAL_COMMITS/g" assets/stats.svg
          sed -i "s/PRS_PLACEHOLDER/$TOTAL_PRS/g" assets/stats.svg
          sed -i "s/ISSUES_PLACEHOLDER/$TOTAL_ISSUES/g" assets/stats.svg
          sed -i "s/REPOS_PLACEHOLDER/$TOTAL_REPOS/g" assets/stats.svg
          sed -i "s/VIEWS_PLACEHOLDER/$TOTAL_VIEWS/g" assets/stats.svg

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add assets/ && git commit -m "chore: update stats [skip ci]" && git push)
