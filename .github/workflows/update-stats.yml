name: Update GitHub Stats

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 AM Beijing Time (UTC+8)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-stats.yml'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate all stats SVGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          mkdir -p assets
          USER="jieefeng"

          echo "=== Fetching user data ==="

          # REST API: user profile
          USER_JSON=$(gh api users/$USER 2>/dev/null)
          REPOS=$(echo "$USER_JSON" | jq -r '.public_repos // 0')
          FOLLOWERS=$(echo "$USER_JSON" | jq -r '.followers // 0')
          STARS=$(gh api "users/$USER/repos?per_page=100" 2>/dev/null | jq '[.[].stargazers_count] | add // 0')
          echo "Repos: $REPOS, Followers: $FOLLOWERS, Stars: $STARS"

          # GraphQL: contributions + PRs + issues + commits + achievements
          GRAPHQL=$(gh api graphql -f query='{
            user(login: "'$USER'") {
              contributionsCollection {
                totalCommitContributions
                totalPullRequestContributions
                totalIssueContributions
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      contributionCount
                      date
                    }
                  }
                }
              }
              starredRepositories {
                totalCount
              }
              pullRequests(first: 1) {
                totalCount
              }
              issues(first: 1) {
                totalCount
              }
            }
          }' 2>/dev/null)

          COMMITS=$(echo "$GRAPHQL" | jq -r '.data.user.contributionsCollection.totalCommitContributions // 0')
          PRS=$(echo "$GRAPHQL" | jq -r '.data.user.contributionsCollection.totalPullRequestContributions // 0')
          ISSUES=$(echo "$GRAPHQL" | jq -r '.data.user.contributionsCollection.totalIssueContributions // 0')
          TOTAL_CONTRIBS=$(echo "$GRAPHQL" | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions // 0')
          echo "Commits: $COMMITS, PRs: $PRS, Issues: $ISSUES, Total: $TOTAL_CONTRIBS"

          # Calculate streak from contribution calendar
          STREAK=0
          MAX_STREAK=0
          CURRENT_STREAK=0
          if [ "$GRAPHQL" != "" ]; then
            # Get all days sorted by date descending
            DAYS=$(echo "$GRAPHQL" | jq -r '[.data.user.contributionsCollection.contributionCalendar.weeks[].contributionDays[]] | sort_by(.date) | reverse | .[].contributionCount')
            for count in $DAYS; do
              if [ "$count" -gt 0 ] 2>/dev/null; then
                CURRENT_STREAK=$((CURRENT_STREAK + 1))
                if [ $CURRENT_STREAK -gt $MAX_STREAK ]; then
                  MAX_STREAK=$CURRENT_STREAK
                fi
              else
                if [ $STREAK -eq 0 ]; then
                  STREAK=$CURRENT_STREAK
                fi
                CURRENT_STREAK=0
              fi
            done
            if [ $STREAK -eq 0 ]; then
              STREAK=$CURRENT_STREAK
            fi
          fi
          echo "Current streak: $STREAK, Max streak: $MAX_STREAK"

          # Extract achievement metrics
          STARS=$(echo "$GRAPHQL" | jq -r '.data.user.starredRepositories.totalCount // 0')
          TOTAL_PRS=$(echo "$GRAPHQL" | jq -r '.data.user.pullRequests.totalCount // 0')
          TOTAL_ISSUES=$(echo "$GRAPHQL" | jq -r '.data.user.issues.totalCount // 0')
          echo "Stars earned: $STARS, Total PRs: $TOTAL_PRS, Total Issues: $TOTAL_ISSUES"

          # Determine achievement tiers
          STARSTRUCK_TIER="none"
          if [ "$STARS" -ge 128 ]; then STARSTRUCK_TIER="⬛ Dark Matter"
          elif [ "$STARS" -ge 64 ]; then STARSTRUCK_TIER="🌟 Supernova"
          elif [ "$STARS" -ge 16 ]; then STARSTRUCK_TIER="✨ Galaxy Brain"
          elif [ "$STARS" -ge 1 ]; then STARSTRUCK_TIER="💫 Starstruck"
          fi

          PULL_SHARK_TIER="none"
          if [ "$TOTAL_PRS" -ge 512 ]; then PULL_SHARK_TIER="🦈 Pullshark III"
          elif [ "$TOTAL_PRS" -ge 128 ]; then PULL_SHARK_TIER="🦈 Pullshark II"
          elif [ "$TOTAL_PRS" -ge 16 ]; then PULL_SHARK_TIER="🦈 Pull Shark"
          elif [ "$TOTAL_PRS" -ge 1 ]; then PULL_SHARK_TIER="🐟 Pull Fish"
          fi

          YOLO_TIER="none"
          if [ "$TOTAL_PRS" -ge 1 ]; then YOLO_TIER="🤠 YOLO"
          fi

          ARCTIC_TIER="none"
          if [ "$TOTAL_CONTRIBS" -ge 1 ]; then ARCTIC_TIER="🏔️ Arctic Code Vault"
          fi

          echo "Achievements: Starstruck=$STARSTRUCK_TIER, PullShark=$PULL_SHARK_TIER, YOLO=$YOLO_TIER, Arctic=$ARCTIC_TIER"

          # Fetch top languages
          echo "=== Fetching languages ==="
          LANGS_JSON=$(gh api "users/$USER/repos?per_page=100&sort=updated" 2>/dev/null)
          # Aggregate language bytes
          LANG_DATA=""
          for repo in $(echo "$LANGS_JSON" | jq -r '.[].full_name'); do
            REPO_LANGS=$(gh api "repos/$repo/languages" 2>/dev/null)
            if [ "$REPO_LANGS" != "" ] && [ "$REPO_LANGS" != "null" ]; then
              LANG_DATA=$(echo -e "$LANG_DATA\n$REPO_LANGS")
            fi
          done
          # Sum languages using jq
          TOP_LANGS=$(echo "$LANG_DATA" | jq -s 'add | to_entries | sort_by(.value) | reverse | .[0:6]' 2>/dev/null)
          echo "Top languages: $(echo $TOP_LANGS | jq -r '.[].key' | tr '\n' ', ')"

          # Calculate total bytes for percentage
          TOTAL_BYTES=$(echo "$TOP_LANGS" | jq -r 'map(.value) | add // 1')

          # Language colors
          declare -A LANG_COLORS=(
            ["Python"]="#3572A5" ["Java"]="#B07219" ["JavaScript"]="#F1E05A"
            ["TypeScript"]="#3178C6" ["Vue"]="#41B883" ["HTML"]="#E34C26"
            ["CSS"]="#563D7C" ["Shell"]="#89E051" ["Go"]="#00ADD8"
            ["C"]="#555555" ["C++"]="#F34B7D" ["Rust"]="#DEA584"
            ["Kotlin"]="#A97BFF" ["Swift"]="#F05138" ["Dart"]="#00B4AB"
            ["Ruby"]="#701516" ["PHP"]="#4F5D95" ["Lua"]="#000080"
            ["Jupyter Notebook"]="#DA5B0B" ["Makefile"]="#427819"
          )

          echo "=== Generating SVGs ==="

          # ---- Achievements Card SVG (Dark) ----
          cat > assets/achievements-card.svg << ACHIEVEMENTS_EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="495" height="280" viewBox="0 0 495 280">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0D1117"/>
                <stop offset="100%" stop-color="#161B22"/>
              </linearGradient>
              <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#92400E"/>
                <stop offset="50%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#F59E0B"/>
              </linearGradient>
              <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#1C2128"/>
                <stop offset="100%" stop-color="#161B22"/>
              </linearGradient>
              <filter id="shadow">
                <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D97706" flood-opacity="0.2"/>
              </filter>
            </defs>
            <rect x="1" y="1" width="493" height="278" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="1" y="1" width="493" height="278" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
            <text x="248" y="36" text-anchor="middle" fill="#D97706" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="600">GitHub Achievements</text>

            <!-- Card 1: Starstruck -->
            <rect x="20" y="55" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
            <text x="90" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">⭐</text>
            <text x="90" y="115" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600">$STARSTRUCK_TIER</text>
            <text x="90" y="135" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">$STARS stars</text>

            <!-- Card 2: Pull Shark -->
            <rect x="178" y="55" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
            <text x="248" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">🦈</text>
            <text x="248" y="115" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600">$PULL_SHARK_TIER</text>
            <text x="248" y="135" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">$TOTAL_PRS PRs</text>

            <!-- Card 3: Arctic -->
            <rect x="336" y="55" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
            <text x="406" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">🏔️</text>
            <text x="406" y="115" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600">Arctic Vault</text>
            <text x="406" y="135" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">$TOTAL_CONTRIBS contribs</text>

            <!-- Card 4: YOLO -->
            <rect x="20" y="165" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
            <text x="90" y="195" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">🤠</text>
            <text x="90" y="225" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600">YOLO</text>
            <text x="90" y="245" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">Direct merge</text>

            <!-- Stats Summary -->
            <rect x="178" y="165" width="298" height="95" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
            <text x="327" y="195" text-anchor="middle" fill="#D97706" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600">📊 Summary</text>
            <text x="327" y="220" text-anchor="middle" fill="#C9D1D9" font-family="'Segoe UI', sans-serif" font-size="12">Contributions: $TOTAL_CONTRIBS</text>
            <text x="327" y="240" text-anchor="middle" fill="#C9D1D9" font-family="'Segoe UI', sans-serif" font-size="12">Stars: $STARS | PRs: $TOTAL_PRS</text>
          </svg>
          ACHIEVEMENTS_EOF

          # ---- Achievements Card SVG (Light) ----
          cat > assets/achievements-card-light.svg << ACHIEVEMENTS_LIGHT_EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="495" height="280" viewBox="0 0 495 280">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FFFBEB"/>
                <stop offset="100%" stop-color="#FEF3C7"/>
              </linearGradient>
              <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#92400E"/>
                <stop offset="50%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#F59E0B"/>
              </linearGradient>
              <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#FFFFFF"/>
                <stop offset="100%" stop-color="#F9FAFB"/>
              </linearGradient>
              <filter id="shadow">
                <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D97706" flood-opacity="0.15"/>
              </filter>
            </defs>
            <rect x="1" y="1" width="493" height="278" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="1" y="1" width="493" height="278" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
            <text x="248" y="36" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="600">GitHub Achievements</text>

            <rect x="20" y="55" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#E5E7EB" stroke-width="1"/>
            <text x="90" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">⭐</text>
            <text x="90" y="115" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600">$STARSTRUCK_TIER</text>
            <text x="90" y="135" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">$STARS stars</text>

            <rect x="178" y="55" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#E5E7EB" stroke-width="1"/>
            <text x="248" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">🦈</text>
            <text x="248" y="115" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600">$PULL_SHARK_TIER</text>
            <text x="248" y="135" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">$TOTAL_PRS PRs</text>

            <rect x="336" y="55" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#E5E7EB" stroke-width="1"/>
            <text x="406" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">🏔️</text>
            <text x="406" y="115" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600">Arctic Vault</text>
            <text x="406" y="135" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">$TOTAL_CONTRIBS contribs</text>

            <rect x="20" y="165" width="140" height="95" rx="10" fill="url(#cardBg)" stroke="#E5E7EB" stroke-width="1"/>
            <text x="90" y="195" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28">🤠</text>
            <text x="90" y="225" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600">YOLO</text>
            <text x="90" y="245" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">Direct merge</text>

            <rect x="178" y="165" width="298" height="95" rx="10" fill="url(#cardBg)" stroke="#E5E7EB" stroke-width="1"/>
            <text x="327" y="195" text-anchor="middle" fill="#B45309" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600">📊 Summary</text>
            <text x="327" y="220" text-anchor="middle" fill="#374151" font-family="'Segoe UI', sans-serif" font-size="12">Contributions: $TOTAL_CONTRIBS</text>
            <text x="327" y="240" text-anchor="middle" fill="#374151" font-family="'Segoe UI', sans-serif" font-size="12">Stars: $STARS | PRs: $TOTAL_PRS</text>
          </svg>
          ACHIEVEMENTS_LIGHT_EOF

          echo "Achievements cards generated"

          # ---- Stats Card SVG ----
          cat > assets/stats-card.svg << STATS_EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0D1117"/>
                <stop offset="100%" stop-color="#161B22"/>
              </linearGradient>
              <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#92400E"/>
                <stop offset="50%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#F59E0B"/>
              </linearGradient>
              <filter id="shadow">
                <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D97706" flood-opacity="0.2"/>
              </filter>
            </defs>
            <rect x="1" y="1" width="493" height="193" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="1" y="1" width="493" height="193" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
            <!-- Title -->
            <text x="248" y="36" text-anchor="middle" fill="#D97706" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="600">GitHub Stats</text>
            <!-- Stats grid: 2 rows x 3 cols -->
            <!-- Row 1 -->
            <text x="83" y="80" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$REPOS</text>
            <text x="83" y="100" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">Repos</text>
            <text x="248" y="80" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$STARS</text>
            <text x="248" y="100" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">Stars</text>
            <text x="413" y="80" text-anchor="middle" fill="#FDE68A" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$FOLLOWERS</text>
            <text x="413" y="100" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">Followers</text>
            <!-- Row 2 -->
            <text x="83" y="145" text-anchor="middle" fill="#FBBF24" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$COMMITS</text>
            <text x="83" y="165" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">Commits</text>
            <text x="248" y="145" text-anchor="middle" fill="#FBBF24" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$PRS</text>
            <text x="248" y="165" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">PRs</text>
            <text x="413" y="145" text-anchor="middle" fill="#FBBF24" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$ISSUES</text>
            <text x="413" y="165" text-anchor="middle" fill="#8B949E" font-family="'Segoe UI', sans-serif" font-size="11">Issues</text>
            <!-- Streak info -->
            <text x="470" y="36" text-anchor="end" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="10">🔥 $STREAK day streak</text>
            <!-- Decorative dots -->
            <circle cx="470" cy="180" r="1.5" fill="#D97706" opacity="0.4"/>
            <circle cx="478" cy="174" r="1" fill="#F59E0B" opacity="0.3"/>
          </svg>
          STATS_EOF

          # ---- Stats Card SVG (Light) ----
          cat > assets/stats-card-light.svg << STATS_LIGHT_EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FFFBEB"/>
                <stop offset="100%" stop-color="#FEF3C7"/>
              </linearGradient>
              <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#92400E"/>
                <stop offset="50%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#F59E0B"/>
              </linearGradient>
              <filter id="shadow">
                <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D97706" flood-opacity="0.15"/>
              </filter>
            </defs>
            <rect x="1" y="1" width="493" height="193" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="1" y="1" width="493" height="193" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
            <text x="248" y="36" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="600">GitHub Stats</text>
            <text x="83" y="80" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$REPOS</text>
            <text x="83" y="100" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">Repos</text>
            <text x="248" y="80" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$STARS</text>
            <text x="248" y="100" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">Stars</text>
            <text x="413" y="80" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$FOLLOWERS</text>
            <text x="413" y="100" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">Followers</text>
            <text x="83" y="145" text-anchor="middle" fill="#B45309" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$COMMITS</text>
            <text x="83" y="165" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">Commits</text>
            <text x="248" y="145" text-anchor="middle" fill="#B45309" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$PRS</text>
            <text x="248" y="165" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">PRs</text>
            <text x="413" y="145" text-anchor="middle" fill="#B45309" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700">$ISSUES</text>
            <text x="413" y="165" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', sans-serif" font-size="11">Issues</text>
            <text x="470" y="36" text-anchor="end" fill="#9CA3AF" font-family="'Segoe UI', sans-serif" font-size="10">🔥 $STREAK day streak</text>
            <circle cx="470" cy="180" r="1.5" fill="#D97706" opacity="0.4"/>
            <circle cx="478" cy="174" r="1" fill="#F59E0B" opacity="0.3"/>
          </svg>
          STATS_LIGHT_EOF

          # ---- Languages Card SVG ----
          # Calculate bar widths (max bar width = 340px)
          MAX_BAR=340
          LANG_SVG=""
          LANG_SVG_LIGHT=""
          Y_OFFSET=50
          if [ "$TOP_LANGS" != "" ] && [ "$TOP_LANGS" != "null" ]; then
            INDEX=0
            while IFS= read -r line; do
              LANG_NAME=$(echo "$line" | jq -r '.key')
              LANG_BYTES=$(echo "$line" | jq -r '.value')
              PERCENT=$((LANG_BYTES * 100 / TOTAL_BYTES))
              BAR_WIDTH=$((LANG_BYTES * MAX_BAR / TOTAL_BYTES))
              if [ $BAR_WIDTH -lt 2 ]; then BAR_WIDTH=2; fi
              COLOR="${LANG_COLORS[$LANG_NAME]:-#8B949E}"
              Y_POS=$((Y_OFFSET + INDEX * 32))
              Y_TEXT=$((Y_POS + 14))
              Y_BAR=$((Y_POS + 20))
              LANG_SVG="$LANG_SVG
            <text x=\"20\" y=\"$Y_TEXT\" fill=\"#C9D1D9\" font-family=\"'Segoe UI', sans-serif\" font-size=\"13\">$LANG_NAME</text>
            <text x=\"470\" y=\"$Y_TEXT\" text-anchor=\"end\" fill=\"#8B949E\" font-family=\"'Segoe UI', sans-serif\" font-size=\"12\">$PERCENT%</text>
            <rect x=\"120\" y=\"$Y_BAR\" width=\"$MAX_BAR\" height=\"8\" rx=\"4\" fill=\"#21262D\"/>
            <rect x=\"120\" y=\"$Y_BAR\" width=\"$BAR_WIDTH\" height=\"8\" rx=\"4\" fill=\"$COLOR\"/>"
              LANG_SVG_LIGHT="$LANG_SVG_LIGHT
            <text x=\"20\" y=\"$Y_TEXT\" fill=\"#1F2937\" font-family=\"'Segoe UI', sans-serif\" font-size=\"13\">$LANG_NAME</text>
            <text x=\"470\" y=\"$Y_TEXT\" text-anchor=\"end\" fill=\"#6B7280\" font-family=\"'Segoe UI', sans-serif\" font-size=\"12\">$PERCENT%</text>
            <rect x=\"120\" y=\"$Y_BAR\" width=\"$MAX_BAR\" height=\"8\" rx=\"4\" fill=\"#E5E7EB\"/>
            <rect x=\"120\" y=\"$Y_BAR\" width=\"$BAR_WIDTH\" height=\"8\" rx=\"4\" fill=\"$COLOR\"/>"
              INDEX=$((INDEX + 1))
              if [ $INDEX -ge 6 ]; then break; fi
            done <<< "$(echo "$TOP_LANGS" | jq -c '.[]')"
          fi

          LANGS_HEIGHT=$((50 + INDEX * 32 + 15))

          cat > assets/langs-card.svg << LANGS_EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="495" height="$LANGS_HEIGHT" viewBox="0 0 495 $LANGS_HEIGHT">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0D1117"/>
                <stop offset="100%" stop-color="#161B22"/>
              </linearGradient>
              <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#F59E0B"/>
                <stop offset="50%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#92400E"/>
              </linearGradient>
              <filter id="shadow">
                <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D97706" flood-opacity="0.2"/>
              </filter>
            </defs>
            <rect x="1" y="1" width="493" height="$(($LANGS_HEIGHT - 2))" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="1" y="1" width="493" height="$(($LANGS_HEIGHT - 2))" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
            <text x="248" y="36" text-anchor="middle" fill="#D97706" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="600">Top Languages</text>
            $LANG_SVG
          </svg>
          LANGS_EOF

          # ---- Languages Card SVG (Light) ----
          cat > assets/langs-card-light.svg << LANGS_LIGHT_EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="495" height="$LANGS_HEIGHT" viewBox="0 0 495 $LANGS_HEIGHT">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FFFBEB"/>
                <stop offset="100%" stop-color="#FEF3C7"/>
              </linearGradient>
              <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#F59E0B"/>
                <stop offset="50%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#92400E"/>
              </linearGradient>
              <filter id="shadow">
                <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D97706" flood-opacity="0.15"/>
              </filter>
            </defs>
            <rect x="1" y="1" width="493" height="$(($LANGS_HEIGHT - 2))" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="1" y="1" width="493" height="$(($LANGS_HEIGHT - 2))" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
            <text x="248" y="36" text-anchor="middle" fill="#92400E" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="600">Top Languages</text>
            $LANG_SVG_LIGHT
          </svg>
          LANGS_LIGHT_EOF

          echo "=== All SVGs generated ==="

      - name: Fetch view count and update views SVG
        run: |
          set +e
          mkdir -p assets

          # Fetch profile views with timeout and retries
          RESPONSE=$(curl -sf --max-time 15 --retry 3 --retry-delay 5 \
            "https://komarev.com/ghpvc/?username=jieefeng&color=blue&style=flat" 2>&1)
          CURL_EXIT=$?

          if [ $CURL_EXIT -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "WARNING: API request failed. Keeping existing SVG."
            exit 0
          fi

          VIEWS=$(echo "$RESPONSE" | grep -oE '[0-9]+</text>' | tail -1 | sed 's/<\/text>//')

          if [ -z "$VIEWS" ] || [ "$VIEWS" = "0" ]; then
            echo "WARNING: Could not parse view count. Keeping existing SVG."
            exit 0
          fi

          echo "Views count: $VIEWS"

          cat > assets/views-card.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="340" height="90" viewBox="0 0 340 90">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0D1117"/>
                <stop offset="100%" stop-color="#161B22"/>
              </linearGradient>
              <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#92400E"/>
                <stop offset="50%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#F59E0B"/>
              </linearGradient>
              <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#FDE68A"/>
                <stop offset="100%" stop-color="#D97706"/>
              </linearGradient>
              <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#F59E0B"/>
              </linearGradient>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                <feMerge>
                  <feMergeNode in="coloredBlur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
              <filter id="shadow">
                <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D97706" flood-opacity="0.25"/>
              </filter>
            </defs>
            <rect x="1" y="1" width="338" height="88" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="1" y="1" width="338" height="88" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
            <rect x="1" y="20" width="3" height="50" rx="1.5" fill="url(#borderGrad)"/>
            <g transform="translate(26, 45)">
              <path d="M-12,-1 C-12,-1 -5,-7 0,-7 C5,-7 12,-1 12,-1 C12,-1 5,5 0,5 C-5,5 -12,-1 -12,-1 Z" fill="none" stroke="url(#eyeGrad)" stroke-width="1.3"/>
              <circle cx="0" cy="-1" r="2.5" fill="#FDE68A"/>
            </g>
            <text x="52" y="36" fill="#8B949E" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10.5" font-weight="500" letter-spacing="2.5">VISITORS</text>
            <text x="52" y="66" fill="url(#textGrad)" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5" filter="url(#glow)">VIEWS_PLACEHOLDER</text>
            <circle cx="300" cy="18" r="1.5" fill="#D97706" opacity="0.5"/>
            <circle cx="310" cy="26" r="1" fill="#F59E0B" opacity="0.4"/>
            <circle cx="305" cy="14" r="0.8" fill="#FDE68A" opacity="0.3"/>
            <circle cx="314" cy="20" r="1.2" fill="#FDE68A" opacity="0.35"/>
          </svg>
          SVGEOF

          sed -i "s/VIEWS_PLACEHOLDER/$VIEWS/g" assets/views-card.svg

          # ---- Views Card SVG (Light) ----
          cat > assets/views-card-light.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="340" height="90" viewBox="0 0 340 90">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FFFBEB"/>
                <stop offset="100%" stop-color="#FEF3C7"/>
              </linearGradient>
              <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#92400E"/>
                <stop offset="50%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#F59E0B"/>
              </linearGradient>
              <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#92400E"/>
                <stop offset="100%" stop-color="#D97706"/>
              </linearGradient>
              <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#F59E0B"/>
              </linearGradient>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
                <feMerge>
                  <feMergeNode in="coloredBlur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
              <filter id="shadow">
                <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D97706" flood-opacity="0.15"/>
              </filter>
            </defs>
            <rect x="1" y="1" width="338" height="88" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="1" y="1" width="338" height="88" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
            <rect x="1" y="20" width="3" height="50" rx="1.5" fill="url(#borderGrad)"/>
            <g transform="translate(26, 45)">
              <path d="M-12,-1 C-12,-1 -5,-7 0,-7 C5,-7 12,-1 12,-1 C12,-1 5,5 0,5 C-5,5 -12,-1 -12,-1 Z" fill="none" stroke="url(#eyeGrad)" stroke-width="1.3"/>
              <circle cx="0" cy="-1" r="2.5" fill="#D97706"/>
            </g>
            <text x="52" y="36" fill="#6B7280" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10.5" font-weight="500" letter-spacing="2.5">VISITORS</text>
            <text x="52" y="66" fill="url(#textGrad)" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5" filter="url(#glow)">VIEWS_PLACEHOLDER</text>
            <circle cx="300" cy="18" r="1.5" fill="#D97706" opacity="0.4"/>
            <circle cx="310" cy="26" r="1" fill="#F59E0B" opacity="0.3"/>
            <circle cx="305" cy="14" r="0.8" fill="#FDE68A" opacity="0.4"/>
            <circle cx="314" cy="20" r="1.2" fill="#FBBF24" opacity="0.3"/>
          </svg>
          SVGEOF

          sed -i "s/VIEWS_PLACEHOLDER/$VIEWS/g" assets/views-card-light.svg

          echo "=== Views card updated ==="

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add assets/ && git commit -m "chore: update stats cards [skip ci]" && git push)
