name: Update GitHub Stats

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 AM Beijing Time (UTC+8)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-stats.yml'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate stats SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets

          # Fetch user stats via GraphQL
          QUERY=$(curl -s -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { user(login:\"jieefeng\") { name contributionsCollection { totalCommitContributions totalPullRequestReviewContributions restrictedContributionsCount contributionCalendar { totalContributions } } repositories(ownerAffiliations:OWNER, isFork:false) { totalCount stargazerCount } pullRequests { totalCount } issues { totalCount } } }"}' \
            https://api.github.com/graphql)

          TOTAL_STARS=$(echo "$QUERY" | jq -r '.data.user.repositories.stargazerCount')
          TOTAL_COMMITS=$(echo "$QUERY" | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions')
          TOTAL_PRS=$(echo "$QUERY" | jq -r '.data.user.pullRequests.totalCount')
          TOTAL_ISSUES=$(echo "$QUERY" | jq -r '.data.user.issues.totalCount')
          TOTAL_REPOS=$(echo "$QUERY" | jq -r '.data.user.repositories.totalCount')

          # Generate stats card SVG
          cat > assets/stats.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195">
            <style>
              .bg { fill: #0d1117; }
              .card { fill: #161b22; rx: 6; }
              .title { fill: #58a6ff; font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; }
              .label { fill: #8b949e; font: 400 14px 'Segoe UI', Ubuntu, Sans-Serif; }
              .value { fill: #f0f6fc; font: 700 20px 'Segoe UI', Ubuntu, Sans-Serif; }
              .icon { fill: #58a6ff; }
            </style>
            <rect class="bg" width="495" height="195" rx="6"/>
            <rect class="card" x="1" y="1" width="493" height="193" rx="6"/>
            <text class="title" x="25" y="35">GitHub Stats</text>
            <g transform="translate(25, 55)">
              <path class="icon" d="M8 0a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.42 7.42 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8a8 8 0 0 0-8-8z" transform="translate(0, -3) scale(0.9)"/>
              <text class="label" x="22" y="14">Total Stars:</text>
              <text class="value" x="160" y="14">STARS_PLACEHOLDER</text>
            </g>
            <g transform="translate(25, 90)">
              <path class="icon" d="M11.93 8.5a4.002 4.002 0 0 1-7.86 0H.75a.75.75 0 0 1 0-1.5h3.32a4.002 4.002 0 0 1 7.86 0h3.32a.75.75 0 0 1 0 1.5h-3.32zM8 10.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z" transform="translate(0, -3) scale(0.9)"/>
              <text class="label" x="22" y="14">Total Commits:</text>
              <text class="value" x="160" y="14">COMMITS_PLACEHOLDER</text>
            </g>
            <g transform="translate(25, 125)">
              <path class="icon" d="M7.177 3.073L9.573.677A.25.25 0 0 1 10 .854v4.792a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354zM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5zm-2.25.75a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25zM11 2.5h-1V4h1a1 1 0 0 1 1 1v5.628a2.251 2.251 0 1 1-1.5 0V5a2.5 2.5 0 0 0-2.5-2.5H8v1.5l-2-2 2-2V2.5z" transform="translate(0, -3) scale(0.9)"/>
              <text class="label" x="22" y="14">Pull Requests:</text>
              <text class="value" x="160" y="14">PRS_PLACEHOLDER</text>
            </g>
            <g transform="translate(260, 55)">
              <path class="icon" d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z" transform="translate(0, -3) scale(0.9)"/>
              <text class="label" x="22" y="14">Issues:</text>
              <text class="value" x="120" y="14">ISSUES_PLACEHOLDER</text>
            </g>
            <g transform="translate(260, 90)">
              <path class="icon" d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5v-9z" transform="translate(0, -3) scale(0.9)"/>
              <text class="label" x="22" y="14">Repositories:</text>
              <text class="value" x="120" y="14">REPOS_PLACEHOLDER</text>
            </g>
          </svg>
          SVGEOF

          # Replace placeholders with actual values
          sed -i "s/STARS_PLACEHOLDER/$TOTAL_STARS/g" assets/stats.svg
          sed -i "s/COMMITS_PLACEHOLDER/$TOTAL_COMMITS/g" assets/stats.svg
          sed -i "s/PRS_PLACEHOLDER/$TOTAL_PRS/g" assets/stats.svg
          sed -i "s/ISSUES_PLACEHOLDER/$TOTAL_ISSUES/g" assets/stats.svg
          sed -i "s/REPOS_PLACEHOLDER/$TOTAL_REPOS/g" assets/stats.svg

          echo "Stats: Stars=$TOTAL_STARS Commits=$TOTAL_COMMITS PRs=$TOTAL_PRS Issues=$TOTAL_ISSUES Repos=$TOTAL_REPOS"

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add assets/ && git commit -m "chore: update stats [skip ci]" && git push)
