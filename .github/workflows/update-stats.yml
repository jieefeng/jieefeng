name: Update GitHub Stats

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 AM Beijing Time (UTC+8)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-stats.yml'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets

          # Debug: check token works
          echo "=== Testing GitHub API ==="
          curl -s -H "Authorization: bearer $GITHUB_TOKEN" \
            https://api.github.com/user | jq '.login'

          # Fetch user stats via GraphQL
          echo "=== Fetching stats ==="
          QUERY=$(curl -s -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ user(login: \"jieefeng\") { repositories(ownerAffiliations: OWNER, isFork: false) { totalCount stargazerCount } contributionsCollection { contributionCalendar { totalContributions } } } }"}' \
            https://api.github.com/graphql)

          echo "GraphQL response: $QUERY"

          TOTAL_STARS=$(echo "$QUERY" | jq -r '.data.user.repositories.stargazerCount // 0')
          TOTAL_COMMITS=$(echo "$QUERY" | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions // 0')
          TOTAL_REPOS=$(echo "$QUERY" | jq -r '.data.user.repositories.totalCount // 0')

          # Fetch PRs via REST API
          echo "=== Fetching PRs ==="
          TOTAL_PRS=$(curl -s -H "Authorization: bearer $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=author:jieefeng+type:pr" | jq -r '.total_count // 0')
          echo "PRs: $TOTAL_PRS"

          # Fetch Issues via REST API
          echo "=== Fetching Issues ==="
          TOTAL_ISSUES=$(curl -s -H "Authorization: bearer $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=author:jieefeng+type:issue" | jq -r '.total_count // 0')
          echo "Issues: $TOTAL_ISSUES"

          echo "=== Final Stats ==="
          echo "Stars=$TOTAL_STARS Commits=$TOTAL_COMMITS PRs=$TOTAL_PRS Issues=$TOTAL_ISSUES Repos=$TOTAL_REPOS"

          # Generate stats card SVG
          cat > assets/stats.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="520" height="200" viewBox="0 0 520 200">
            <rect width="520" height="200" rx="8" fill="#FFFFFF"/>
            <rect x="0.5" y="0.5" width="519" height="199" rx="8" fill="none" stroke="#D0D7DE"/>
            <circle cx="20" cy="16" r="5" fill="#2DA44E"/>
            <text x="32" y="20" fill="#1F2328" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="600">GitHub Stats</text>
            <g transform="translate(20, 42)">
              <text fill="#656D76" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Stars</text>
              <text x="110" fill="#1A7F37" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">STARS_PLACEHOLDER</text>
            </g>
            <g transform="translate(20, 78)">
              <text fill="#656D76" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Commits</text>
              <text x="110" fill="#0969DA" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">COMMITS_PLACEHOLDER</text>
            </g>
            <g transform="translate(20, 114)">
              <text fill="#656D76" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Pull Requests</text>
              <text x="110" fill="#8250DF" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">PRS_PLACEHOLDER</text>
            </g>
            <g transform="translate(20, 150)">
              <text fill="#656D76" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Issues</text>
              <text x="110" fill="#BF8700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">ISSUES_PLACEHOLDER</text>
            </g>
            <g transform="translate(280, 42)">
              <text fill="#656D76" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12">Repositories</text>
              <text x="110" fill="#1F2328" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">REPOS_PLACEHOLDER</text>
            </g>
            <line x1="20" y1="185" x2="500" y2="185" stroke="#D8DEE4" stroke-width="1"/>
            <text x="260" y="197" text-anchor="middle" fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10">Updated daily via GitHub Actions</text>
          </svg>
          SVGEOF

          # Replace placeholders with actual values
          sed -i "s/STARS_PLACEHOLDER/$TOTAL_STARS/g" assets/stats.svg
          sed -i "s/COMMITS_PLACEHOLDER/$TOTAL_COMMITS/g" assets/stats.svg
          sed -i "s/PRS_PLACEHOLDER/$TOTAL_PRS/g" assets/stats.svg
          sed -i "s/ISSUES_PLACEHOLDER/$TOTAL_ISSUES/g" assets/stats.svg
          sed -i "s/REPOS_PLACEHOLDER/$TOTAL_REPOS/g" assets/stats.svg

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add assets/ && git commit -m "chore: update stats [skip ci]" && git push)
